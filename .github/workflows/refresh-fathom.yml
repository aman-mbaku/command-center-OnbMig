# .github/workflows/refresh-fathom.yml
# Runs every 30 min — keeps Fathom cache warm on Vercel

name: Refresh Fathom Cache

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping refresh endpoint
        run: |
          curl -s https://command-center-onb-mig.vercel.app/api/refresh-fathom
